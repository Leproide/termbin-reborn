worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    server_tokens       off;
    default_type        application/octet-stream;
    charset             utf-8;

    types {
        text/plain  txt;
        text/html   html htm;
    }

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    keepalive_timeout   30;
    send_timeout        30;
    client_max_body_size 0;

    server {
        listen      80;
        server_name _;

        root /srv/paste;

        autoindex off;

        add_header X-Content-Type-Options  "nosniff"          always;
        add_header X-Frame-Options         "DENY"             always;
        add_header X-XSS-Protection        "1; mode=block"    always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline';" always;
        add_header Referrer-Policy         "no-referrer"      always;

        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        # Block dotfiles and path traversal
        location ~ (^\.|/\.|\.\./) {
            deny all;
            return 404;
        }

        # Block executable extensions
        location ~* \.(php|phtml|pl|py|rb|sh|cgi|asp|aspx|jsp|exe|bat|cmd)$ {
            deny all;
            return 404;
        }

        # Root: serve index.html from static dir
        location = / {
            root /srv/static;
            try_files /index.html =404;
            types { text/html html; }
            default_type text/html;
        }

        # Slug: serve index.txt as plain text
        location ~ ^/([a-z0-9]+)/?$ {
            try_files /$1/index.txt =404;
            types { text/plain txt; }
            default_type text/plain;
        }

        location / {
            return 404;
        }

        error_page 403 404 =404 /dev/null;
    }
}